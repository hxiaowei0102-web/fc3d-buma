name: 每日自动更新两码不组预测 (三重备份)

on:
  schedule:
    # 北京时间 22:00 = UTC 14:00
    - cron: '0 14 * * *'
    # 北京时间 23:30 = UTC 15:30 (备份)
    - cron: '30 15 * * *'
    # 北京时间 01:00 = UTC 17:00 (二次备份)
    - cron: '0 17 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 同步最新代码
        run: |
          git pull --rebase origin master 2>/dev/null || git rebase --abort 2>/dev/null || true
      
      - name: 检查是否需要更新
        id: check
        run: |
          # 手动触发(workflow_dispatch) 强制运行, 不检查重复
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skipped=false" >> $GITHUB_OUTPUT
            echo "手动触发, 强制执行"
            exit 0
          fi
          TODAY=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')
          # 检查上一次提交是否包含今天日期
          if git log -1 --pretty=format:"%s" | grep -q "$TODAY"; then
            # 进一步检查: 缓存中是否已经有今天的开奖数据
            if [ -f docs/fc3d_cache.json ]; then
              LAST_DATE=$(python3 -c "
import json
with open('docs/fc3d_cache.json','r') as f:
    d=json.load(f)
print('stale' if d[-1][1] < '$TODAY' else 'fresh')
" 2>/dev/null || echo 'stale')
              if [ "$LAST_DATE" = "stale" ]; then
                echo "skipped=false" >> $GITHUB_OUTPUT
                echo "数据过期(最新: $LAST_DATE), 重新拉取"
                exit 0
              fi
            fi
            echo "skipped=true" >> $GITHUB_OUTPUT
            echo "今日已更新且数据新鲜, 跳过"
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 运行预测算法
        if: steps.check.outputs.skipped != 'true'
        run: |
          cd docs
          python fc3d_buma.py
      
      - name: 提交更新
        if: steps.check.outputs.skipped != 'true'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/fc3d_cache.json docs/fc3d_embedded.json
          if git diff --staged --quiet; then
            echo "无变更"
            exit 0
          fi
          git commit -m "🤖 自动更新 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          # 重试3次push, 每次先rebase到最新
          for i in 1 2 3; do
            if git pull --rebase origin master && git push; then
              echo "push_ok=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            # 如果rebase冲突, accept算法生成的文件为权威
            git checkout --theirs docs/index.html docs/fc3d_cache.json docs/fc3d_embedded.json 2>/dev/null
            git add docs/index.html docs/fc3d_cache.json docs/fc3d_embedded.json 2>/dev/null
            git rebase --continue 2>/dev/null || git rebase --abort
            echo "push失败, 第${i}次重试..."
            sleep $(($i * 5))
          done
          echo "push_ok=false" >> $GITHUB_OUTPUT
          echo "::error::git push 连续3次失败"
          exit 1

      - name: 失败通知
        if: failure() && steps.check.outputs.skipped != 'true'
        run: |
          gh issue create \
            --title "⚠ Workflow 失败 $(TZ='Asia/Shanghai' date +'%m-%d %H:%M')" \
            --body "自动更新失败，请检查 [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --label "bug" 2>/dev/null || echo "Issue创建失败(可能已有通知)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
