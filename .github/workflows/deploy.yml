name: 每日自动更新两码不组预测

on:
  schedule:
    # 北京时间 22:00 = UTC 14:00
    - cron: '0 14 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 运行预测算法
        run: |
          cd deploy
          python fc3d_buma.py
      
      - name: 提交更新
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/index.html deploy/fc3d_cache.json
          git diff --staged --quiet || git commit -m "🤖 自动更新 $(date +'%Y-%m-%d')"
          git push
