name: 每日自动更新两码不组预测 (三重备份)

on:
  schedule:
    # 北京时间 22:00 = UTC 14:00
    - cron: '0 14 * * *'
    # 北京时间 23:30 = UTC 15:30 (备份)
    - cron: '30 15 * * *'
    # 北京时间 01:00 = UTC 17:00 (二次备份)
    - cron: '0 17 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 检查是否需要更新
        id: check
        run: |
          # 手动触发(workflow_dispatch) 强制运行, 不检查重复
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "skipped=false" >> $GITHUB_OUTPUT
            echo "手动触发, 强制执行"
            exit 0
          fi
          TODAY=$(TZ='Asia/Shanghai' date +'%Y-%m-%d')
          if git log -1 --pretty=format:"%s" | grep -q "$TODAY"; then
            echo "skipped=true" >> $GITHUB_OUTPUT
            echo "今日已更新, 跳过"
          else
            echo "skipped=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 运行预测算法
        if: steps.check.outputs.skipped != 'true'
        run: |
          cd docs
          python fc3d_buma.py
      
      - name: 提交更新
        if: steps.check.outputs.skipped != 'true'
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/index.html docs/fc3d_cache.json docs/fc3d_embedded.json
          if git diff --staged --quiet; then
            echo "无变更"
            exit 0
          fi
          git commit -m "🤖 自动更新 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          # 重试3次push, 每次先pull --rebase防冲突
          for i in 1 2 3; do
            if git pull --rebase origin master 2>/dev/null && git push; then
              echo "push_ok=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "push失败, 第${i}次重试..."
            sleep $(($i * 5))
          done
          echo "push_ok=false" >> $GITHUB_OUTPUT
          echo "::error::git push 连续3次失败"
          exit 1

      - name: 失败通知
        if: failure() && steps.check.outputs.skipped != 'true'
        run: |
          gh issue create \
            --title "⚠ Workflow 失败 $(TZ='Asia/Shanghai' date +'%m-%d %H:%M')" \
            --body "自动更新失败，请检查 [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})" \
            --label "bug" 2>/dev/null || echo "Issue创建失败(可能已有通知)"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
