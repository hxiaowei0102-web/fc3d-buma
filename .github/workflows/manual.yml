name: 手动触发更新

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - '.github/workflows/manual.yml'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      
      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: 安装依赖
        run: pip install requests cloudscraper
      
      - name: 同步最新代码
        run: |
          git pull --rebase origin master || git rebase --abort
      
      - name: 运行预测算法
        run: |
          cd docs
          python fc3d_buma.py
      
      - name: 提交更新
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          # 先拉取最新, 避免冲突
          git fetch origin master
          
          # 只提交数据文件和生成的HTML (算法输出是权威源)
          git add docs/index.html docs/fc3d_cache.json docs/fc3d_embedded.json
          if git diff --staged --quiet; then
            echo "无变更, 数据已是最新"
            exit 0
          fi
          
          git commit -m "🤖 手动触发更新 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')"
          
          # 重试push: 先rebase到最新, 再用theirs策略自动解决冲突
          for i in 1 2 3; do
            if git rebase origin/master 2>/dev/null; then
              if git push 2>/dev/null; then
                exit 0
              fi
            else
              # rebase冲突时, 我们的生成文件是权威源
              git checkout --theirs docs/index.html docs/fc3d_cache.json docs/fc3d_embedded.json 2>/dev/null
              git add docs/index.html docs/fc3d_cache.json docs/fc3d_embedded.json 2>/dev/null
              git rebase --continue 2>/dev/null || git rebase --abort
              git reset --soft origin/master 2>/dev/null
              git add docs/index.html docs/fc3d_cache.json docs/fc3d_embedded.json 2>/dev/null
              git commit -m "🤖 手动触发更新 $(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M')" 2>/dev/null
              if git push 2>/dev/null; then
                exit 0
              fi
            fi
            sleep $(($i * 5))
          done
          echo "::error::git push 连续3次失败"
          exit 1
